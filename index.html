<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訊息提示範例</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
            background-color: #f4f4f9;
        }
        .action-btn {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .action-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <h2>JavaScript 訊息序列測試</h2>
    <p>點擊下方按鈕以依序觸發提示視窗：</p>
    
    <button class="action-btn" onclick="showAlertSequence()">啟動測試</button>

    <script>
        // 你可以在這裡自由修改想要顯示的文字內容
        const messages = [
            "nigger",
            "nigger",
            "nigger"
        ];

        function showAlertSequence() {
            // 使用 for 迴圈依序讀取陣列中的文字並彈出
            for (let i = 0; i < messages.length; i++) {
                alert(messages[i]);
            }
        }
    </script>

</body>
</html>
